<header class="header">
  <div class="header__hero">
    <div class="hero__bg"></div>
    <div class="container">
      <nav
        data-hx-trigger="load"
        data-hx-swap="outerHTML"
        data-hx-get="global.header-nav.partial.html"
      ></nav>
      <div class="header__top">
        <div class="header__logo">
          <a href="index.html" class="header__logo-link"
            ><img
              class="header__logo-img"
              src="img/figma-title.png"
              alt="Figma title"
            />
          </a>
        </div>

        <button class="header__button-menu" aria-label="open menu">
          <img
            class="header__icon-img"
            src="img/icons/mobile-menu.svg"
            alt=""
          />
        </button>
      </div>
    </div>

    <div class="header__intro">
      <h1 class="header__title">The best products starts with Figma</h1>
      <div class="header__text">
        <p class="header__text-item">
          Most calendars are designed for teams.
          <span class="header__text-item2">
            Slate is designed for freelancers
          </span>
        </p>
      </div>
    </div>

    <div class="header__actions">
      <a href="#" class="button button--primary">
        <span class="header__actions-mobile">Try For</span>
        <span class="header__actions-desktop">Try For Free</span>
      </a>
    </div>
  </div>
</header>
